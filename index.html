<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Fast Digital Solutions — Em Breve</title>
    <meta name="description" content="Estamos construindo algo incrível. Em breve, a Just Fast Digital Solutions estará no ar.">
    <link rel="icon" type="image/png" href="imagens/logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #111128;
            color: #e8e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ===== ESTRELAS ===== */
        body::before,
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        body::before {
            background:
                radial-gradient(1px 1px at 2% 8%, rgba(200, 220, 255, 0.9), transparent),
                radial-gradient(1.2px 1.2px at 5% 25%, rgba(180, 210, 255, 0.7), transparent),
                radial-gradient(1px 1px at 8% 52%, rgba(200, 220, 255, 0.6), transparent),
                radial-gradient(1.5px 1.5px at 3% 78%, rgba(220, 230, 255, 0.8), transparent),
                radial-gradient(1px 1px at 7% 93%, rgba(200, 220, 255, 0.5), transparent),
                radial-gradient(1.3px 1.3px at 12% 15%, rgba(200, 220, 255, 0.8), transparent),
                radial-gradient(1px 1px at 15% 42%, rgba(180, 210, 255, 0.6), transparent),
                radial-gradient(1.5px 1.5px at 11% 67%, rgba(220, 230, 255, 0.9), transparent),
                radial-gradient(1px 1px at 18% 88%, rgba(200, 220, 255, 0.5), transparent),
                radial-gradient(1px 1px at 22% 5%, rgba(200, 220, 255, 0.7), transparent),
                radial-gradient(1.4px 1.4px at 25% 33%, rgba(180, 210, 255, 0.8), transparent),
                radial-gradient(1px 1px at 20% 58%, rgba(200, 220, 255, 0.6), transparent),
                radial-gradient(1px 1px at 28% 72%, rgba(220, 230, 255, 0.7), transparent),
                radial-gradient(1.5px 1.5px at 23% 95%, rgba(200, 220, 255, 0.5), transparent),
                radial-gradient(1px 1px at 32% 12%, rgba(200, 220, 255, 0.8), transparent),
                radial-gradient(1.2px 1.2px at 35% 28%, rgba(180, 210, 255, 0.6), transparent),
                radial-gradient(1px 1px at 38% 48%, rgba(200, 220, 255, 0.7), transparent),
                radial-gradient(1.5px 1.5px at 33% 65%, rgba(220, 230, 255, 0.9), transparent),
                radial-gradient(1px 1px at 37% 82%, rgba(200, 220, 255, 0.5), transparent),
                radial-gradient(1.3px 1.3px at 42% 7%, rgba(200, 220, 255, 0.7), transparent),
                radial-gradient(1px 1px at 45% 22%, rgba(180, 210, 255, 0.8), transparent),
                radial-gradient(1px 1px at 48% 40%, rgba(200, 220, 255, 0.6), transparent),
                radial-gradient(1.5px 1.5px at 43% 55%, rgba(220, 230, 255, 0.7), transparent),
                radial-gradient(1px 1px at 47% 75%, rgba(200, 220, 255, 0.5), transparent),
                radial-gradient(1.2px 1.2px at 50% 90%, rgba(200, 220, 255, 0.8), transparent);
            animation: starsTwinkle 3s ease-in-out infinite alternate;
        }

        body::after {
            background:
                radial-gradient(1px 1px at 53% 10%, rgba(200, 220, 255, 0.7), transparent),
                radial-gradient(1.5px 1.5px at 55% 30%, rgba(220, 230, 255, 0.9), transparent),
                radial-gradient(1px 1px at 58% 50%, rgba(200, 220, 255, 0.6), transparent),
                radial-gradient(1px 1px at 52% 68%, rgba(180, 210, 255, 0.7), transparent),
                radial-gradient(1.3px 1.3px at 57% 85%, rgba(200, 220, 255, 0.5), transparent),
                radial-gradient(1px 1px at 62% 5%, rgba(200, 220, 255, 0.8), transparent),
                radial-gradient(1.4px 1.4px at 65% 22%, rgba(220, 230, 255, 0.7), transparent),
                radial-gradient(1px 1px at 68% 45%, rgba(200, 220, 255, 0.6), transparent),
                radial-gradient(1px 1px at 63% 62%, rgba(180, 210, 255, 0.8), transparent),
                radial-gradient(1.5px 1.5px at 67% 78%, rgba(200, 220, 255, 0.5), transparent),
                radial-gradient(1px 1px at 72% 15%, rgba(200, 220, 255, 0.7), transparent),
                radial-gradient(1.2px 1.2px at 75% 35%, rgba(220, 230, 255, 0.8), transparent),
                radial-gradient(1px 1px at 78% 55%, rgba(200, 220, 255, 0.6), transparent),
                radial-gradient(1px 1px at 73% 72%, rgba(180, 210, 255, 0.7), transparent),
                radial-gradient(1.5px 1.5px at 77% 92%, rgba(200, 220, 255, 0.9), transparent),
                radial-gradient(1px 1px at 82% 8%, rgba(200, 220, 255, 0.6), transparent),
                radial-gradient(1.3px 1.3px at 85% 28%, rgba(220, 230, 255, 0.7), transparent),
                radial-gradient(1px 1px at 88% 48%, rgba(200, 220, 255, 0.8), transparent),
                radial-gradient(1px 1px at 83% 65%, rgba(180, 210, 255, 0.5), transparent),
                radial-gradient(1.5px 1.5px at 87% 82%, rgba(200, 220, 255, 0.7), transparent),
                radial-gradient(1px 1px at 92% 18%, rgba(200, 220, 255, 0.8), transparent),
                radial-gradient(1.2px 1.2px at 95% 38%, rgba(220, 230, 255, 0.6), transparent),
                radial-gradient(1px 1px at 97% 58%, rgba(200, 220, 255, 0.7), transparent),
                radial-gradient(1px 1px at 93% 75%, rgba(180, 210, 255, 0.9), transparent),
                radial-gradient(1.5px 1.5px at 98% 95%, rgba(200, 220, 255, 0.5), transparent);
            animation: starsTwinkle2 4s ease-in-out infinite alternate;
        }

        @keyframes starsTwinkle {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        @keyframes starsTwinkle2 {
            0% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        /* ===== GLOW BACKGROUND ===== */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
        }

        .glow-orb-1 {
            width: 400px;
            height: 400px;
            background: #2196F3;
            top: -100px;
            right: -100px;
            animation: floatOrb 8s ease-in-out infinite alternate;
        }

        .glow-orb-2 {
            width: 300px;
            height: 300px;
            background: #1976D2;
            bottom: -80px;
            left: -80px;
            animation: floatOrb 10s ease-in-out infinite alternate-reverse;
        }

        @keyframes floatOrb {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, -30px); }
        }

        /* ===== CONTEUDO ===== */
        .container {
            text-align: center;
            padding: 40px 24px;
            position: relative;
            z-index: 1;
            max-width: 600px;
        }

        .logo-completa {
            max-width: 400px;
            width: 85%;
            margin-bottom: 48px;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 16px;
            line-height: 1.3;
        }

        h1 span {
            background: linear-gradient(135deg, #2196F3, #64B5F6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 17px;
            color: #9a9ab0;
            line-height: 1.7;
            margin-bottom: 48px;
        }

        /* ===== BADGE ===== */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: rgba(33, 150, 243, 0.1);
            border: 1px solid rgba(33, 150, 243, 0.25);
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            color: #64B5F6;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 48px;
        }

        .badge::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #2196F3;
            border-radius: 50%;
            animation: badgePulse 2s ease-in-out infinite;
        }

        @keyframes badgePulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(33, 150, 243, 0.4); }
            50% { opacity: 0.6; box-shadow: 0 0 0 6px rgba(33, 150, 243, 0); }
        }

        /* ===== CONTATO ===== */
        .contato-links {
            display: flex;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .contato-link {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #b0b0c0;
            font-size: 15px;
            padding: 12px 24px;
            background: linear-gradient(145deg, #1a1a3a, #222248);
            border: 1px solid rgba(33, 150, 243, 0.15);
            border-radius: 50px;
            transition: border-color 0.3s, color 0.3s, transform 0.3s;
        }

        .contato-link:hover {
            border-color: rgba(33, 150, 243, 0.5);
            color: #fff;
            transform: translateY(-2px);
        }

        .contato-link svg {
            width: 18px;
            height: 18px;
            fill: #2196F3;
            flex-shrink: 0;
        }

        .contato-link svg.stroke-icon {
            fill: none;
            stroke: #2196F3;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ===== RESPONSIVO ===== */
        @media (max-width: 480px) {
            h1 { font-size: 26px; }
            .subtitle { font-size: 15px; }
            .contato-links { flex-direction: column; align-items: center; }
            .logo-completa { max-width: 280px; }
        }
    </style>
</head>
<body>

    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <div class="container">
        <img src="imagens/logo completa 2.png" alt="Just Fast Digital Solutions" class="logo-completa">

        <h1 id="titulo"></h1>
        <p class="subtitle" id="subtitulo"></p>

        <div class="badge" id="badge"></div>

        <div class="contato-links">

            </a>
        </div>
    </div>

    <script>
        const lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase().startsWith('pt') ? 'pt' : 'en';

        const texts = {
            pt: {
                title: 'Nosso site está <span>em construção</span>',
                subtitle: 'Estamos preparando algo incrível para você. Enquanto isso, entre em contato para conhecer nossos serviços.',
                badge: 'Em desenvolvimento',
                pageTitle: 'Just Fast Digital Solutions — Em Breve'
            },
            en: {
                title: 'Our website is <span>under construction</span>',
                subtitle: 'We\'re building something amazing for you. In the meantime, get in touch to learn about our services.',
                badge: 'Under development',
                pageTitle: 'Just Fast Digital Solutions — Coming Soon'
            }
        };

        document.getElementById('titulo').innerHTML = texts[lang].title;
        document.getElementById('subtitulo').textContent = texts[lang].subtitle;
        document.getElementById('badge').textContent = texts[lang].badge;
        document.title = texts[lang].pageTitle;
    </script>
</body>
</html>
